<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760">
  <defs>
    <style>
      .title { font-family: "Noto Sans CJK SC", "Source Han Sans SC", "Microsoft YaHei", Arial, sans-serif; font-size: 26px; font-weight: 700; fill: #1f2937; }
      .subtitle { font-family: "Noto Sans CJK SC", "Source Han Sans SC", "Microsoft YaHei", Arial, sans-serif; font-size: 14px; fill: #4b5563; }
      .label { font-family: "Noto Sans CJK SC", "Source Han Sans SC", "Microsoft YaHei", Arial, sans-serif; font-size: 14px; fill: #111827; }
      .small { font-family: "Noto Sans CJK SC", "Source Han Sans SC", "Microsoft YaHei", Arial, sans-serif; font-size: 12px; fill: #374151; }
      .tiny { font-family: "Noto Sans CJK SC", "Source Han Sans SC", "Microsoft YaHei", Arial, sans-serif; font-size: 11px; fill: #4b5563; }
      .axis { stroke: #374151; stroke-width: 1.5; }
      .grid { stroke: #e5e7eb; stroke-width: 1; }
    </style>
  </defs>

  <rect width="1280" height="760" fill="#ffffff"/>
  <text x="640" y="42" text-anchor="middle" class="title">不同实体类别识别 F1 值</text>
  <text x="640" y="67" text-anchor="middle" class="subtitle">F1-score of EDBP for Different Entity Categories</text>

  <rect x="56" y="96" width="928" height="520" rx="12" fill="#ffffff" stroke="#cbd5e1"/>
  <line x1="112" y1="548" x2="930" y2="548" class="axis"/>
  <line x1="112" y1="128" x2="112" y2="548" class="axis"/>
  <g>
    <line x1="112" y1="464" x2="930" y2="464" class="grid"/><text x="92" y="469" text-anchor="end" class="small">20</text>
    <line x1="112" y1="380" x2="930" y2="380" class="grid"/><text x="92" y="385" text-anchor="end" class="small">40</text>
