<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <style>
      .title { font-family: "Noto Sans CJK SC", "Source Han Sans SC", "Microsoft YaHei", Arial, sans-serif; font-size: 26px; font-weight: 700; fill: #1f2937; }
      .subtitle { font-family: "Noto Sans CJK SC", "Source Han Sans SC", "Microsoft YaHei", Arial, sans-serif; font-size: 14px; fill: #4b5563; }
      .label { font-family: "Noto Sans CJK SC", "Source Han Sans SC", "Microsoft YaHei", Arial, sans-serif; font-size: 17px; font-weight: 700; fill: #111827; }
      .small { font-family: "Noto Sans CJK SC", "Source Han Sans SC", "Microsoft YaHei", Arial, sans-serif; font-size: 14px; fill: #374151; }
      .tiny { font-family: "Noto Sans CJK SC", "Source Han Sans SC", "Microsoft YaHei", Arial, sans-serif; font-size: 12px; fill: #4b5563; }
      .panel { stroke: #cbd5e1; stroke-width: 1.3; fill: #f8fafc; }
      .token { stroke: #cbd5e1; stroke-width: 1; fill: #ffffff; }
      .gold { stroke: #16a34a; stroke-width: 2; fill: none; }
      .pred { stroke: #2563eb; stroke-width: 2; fill: none; }
      .miss { stroke: #dc2626; stroke-width: 2; stroke-dasharray: 5 4; fill: none; }
    </style>
  </defs>

  <rect width="1280" height="720" fill="#ffffff"/>
  <text x="640" y="42" text-anchor="middle" class="title">典型低频实体与边界错误示例</text>
  <text x="640" y="67" text-anchor="middle" class="subtitle">Typical Low-frequency Entity and Boundary Error Cases</text>

  <g transform="translate(72,96)">
    <rect x="0" y="0" width="1136" height="152" rx="12" class="panel"/>
    <text x="24" y="34" class="label">案例 1：肥料类低频复合实体漏检</text>
    <text x="24" y="62" class="tiny">证据：redjujube_test.json 第 175 条；model2_predictions.json</text>
    <g transform="translate(36,86)">
      <rect x="0" y="0" width="38" height="36" rx="5" class="token"/><text x="19" y="24" text-anchor="middle" class="small">中</text>
      <rect x="42" y="0" width="38" height="36" rx="5" class="token"/><text x="61" y="24" text-anchor="middle" class="small">性</text>
      <rect x="84" y="0" width="38" height="36" rx="5" class="token"/><text x="103" y="24" text-anchor="middle" class="small">有</text>
      <rect x="126" y="0" width="38" height="36" rx="5" class="token"/><text x="145" y="24" text-anchor="middle" class="small">机</text>
      <rect x="168" y="0" width="38" height="36" rx="5" class="token"/><text x="187" y="24" text-anchor="middle" class="small">肥</text>
      <rect x="210" y="0" width="38" height="36" rx="5" class="token"/><text x="229" y="24" text-anchor="middle" class="small">料</text>
      <rect x="-4" y="-6" width="256" height="48" rx="7" class="gold"/>
      <rect x="-4" y="-6" width="256" height="48" rx="7" class="miss"/>
      <text x="124" y="66" text-anchor="middle" class="tiny" fill="#16a34a">金标 FER：[96,102]</text>
      <text x="322" y="23" class="small" fill="#dc2626">预测：无对应实体，低频复合肥料漏检</text>
    </g>
  </g>

  <g transform="translate(72,282)">
    <rect x="0" y="0" width="1136" height="152" rx="12" class="panel"/>
    <text x="24" y="34" class="label">案例 2：复合修饰结构漏检</text>
    <text x="24" y="62" class="tiny">证据：redjujube_test.json 第 175 条；model2_predictions.json</text>
    <g transform="translate(36,86)">
      <rect x="0" y="0" width="38" height="36" rx="5" class="token"/><text x="19" y="24" text-anchor="middle" class="small">生</text>
      <rect x="42" y="0" width="38" height="36" rx="5" class="token"/><text x="61" y="24" text-anchor="middle" class="small">理</text>
      <rect x="84" y="0" width="38" height="36" rx="5" class="token"/><text x="103" y="24" text-anchor="middle" class="small">酸</text>
      <rect x="126" y="0" width="38" height="36" rx="5" class="token"/><text x="145" y="24" text-anchor="middle" class="small">性</text>
      <rect x="168" y="0" width="38" height="36" rx="5" class="token"/><text x="187" y="24" text-anchor="middle" class="small">肥</text>
      <rect x="210" y="0" width="38" height="36" rx="5" class="token"/><text x="229" y="24" text-anchor="middle" class="small">料</text>
      <rect x="-4" y="-6" width="256" height="48" rx="7" class="gold"/>
      <rect x="-4" y="-6" width="256" height="48" rx="7" class="miss"/>
      <text x="124" y="66" text-anchor="middle" class="tiny" fill="#16a34a">金标 FER：[178,184]</text>
      <text x="322" y="23" class="small" fill="#dc2626">预测：无对应实体，语义修饰结构未被词典覆盖</text>
    </g>
  </g>

  <g transform="translate(72,468)">
    <rect x="0" y="0" width="1136" height="152" rx="12" class="panel"/>
    <text x="24" y="34" class="label">案例 3：相邻同类实体边界合并</text>
    <text x="24" y="62" class="tiny">证据：redjujube_test.json 第 175 条；model2_predictions.json</text>
    <g transform="translate(36,86)">
      <rect x="0" y="0" width="38" height="36" rx="5" class="token"/><text x="19" y="24" text-anchor="middle" class="small">硫</text>
      <rect x="42" y="0" width="38" height="36" rx="5" class="token"/><text x="61" y="24" text-anchor="middle" class="small">酸</text>
      <rect x="84" y="0" width="38" height="36" rx="5" class="token"/><text x="103" y="24" text-anchor="middle" class="small">钾</text>
      <rect x="126" y="0" width="38" height="36" rx="5" class="token"/><text x="145" y="24" text-anchor="middle" class="small">固</text>
      <rect x="168" y="0" width="38" height="36" rx="5" class="token"/><text x="187" y="24" text-anchor="middle" class="small">体</text>
      <rect x="210" y="0" width="38" height="36" rx="5" class="token"/><text x="229" y="24" text-anchor="middle" class="small">肥</text>
      <rect x="-4" y="-6" width="130" height="48" rx="7" class="gold"/>
      <rect x="122" y="-6" width="130" height="48" rx="7" class="gold"/>
      <rect x="-4" y="-12" width="256" height="60" rx="7" class="pred"/>
      <text x="61" y="66" text-anchor="middle" class="tiny" fill="#16a34a">金标 FER</text>
      <text x="187" y="66" text-anchor="middle" class="tiny" fill="#16a34a">金标 FER</text>
      <text x="322" y="23" class="small" fill="#2563eb">预测：[165,171]，两个相邻肥料被合并为一个 span</text>
    </g>
  </g>

  <g transform="translate(810,640)">
    <rect x="0" y="0" width="16" height="16" rx="2" class="gold"/><text x="24" y="13" class="tiny">金标</text>
    <rect x="82" y="0" width="16" height="16" rx="2" class="pred"/><text x="106" y="13" class="tiny">预测</text>
    <rect x="168" y="0" width="16" height="16" rx="2" class="miss"/><text x="192" y="13" class="tiny">漏检</text>
  </g>
</svg>
