<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#374151"/>
    </marker>
    <style>
      .title { font-family: "Noto Sans CJK SC", "Source Han Sans SC", "Microsoft YaHei", Arial, sans-serif; font-size: 26px; font-weight: 700; fill: #1f2937; }
      .subtitle { font-family: "Noto Sans CJK SC", "Source Han Sans SC", "Microsoft YaHei", Arial, sans-serif; font-size: 14px; fill: #4b5563; }
      .label { font-family: "Noto Sans CJK SC", "Source Han Sans SC", "Microsoft YaHei", Arial, sans-serif; font-size: 17px; font-weight: 700; fill: #111827; }
      .small { font-family: "Noto Sans CJK SC", "Source Han Sans SC", "Microsoft YaHei", Arial, sans-serif; font-size: 14px; fill: #374151; }
      .tiny { font-family: "Noto Sans CJK SC", "Source Han Sans SC", "Microsoft YaHei", Arial, sans-serif; font-size: 12px; fill: #4b5563; }
      .box { stroke: #475569; stroke-width: 1.4; fill: #ffffff; }
      .panel { stroke: #cbd5e1; stroke-width: 1.3; fill: #f8fafc; }
      .line { stroke: #374151; stroke-width: 1.8; fill: none; marker-end: url(#arrow); }
      .grid { stroke: #cbd5e1; stroke-width: 1; }
    </style>
  </defs>

  <rect width="1280" height="720" fill="#ffffff"/>
  <text x="640" y="42" text-anchor="middle" class="title">边界预测解码器结构</text>
  <text x="640" y="67" text-anchor="middle" class="subtitle">Boundary Prediction Decoder with Biaffine Scoring</text>

  <rect x="55" y="128" width="210" height="420" rx="14" class="panel"/>
  <text x="160" y="162" text-anchor="middle" class="label">融合特征</text>
  <rect x="88" y="222" width="144" height="88" rx="8" fill="#ecfdf5" class="box"/>
  <text x="160" y="257" text-anchor="middle" class="small">H_fused</text>
  <text x="160" y="282" text-anchor="middle" class="tiny">语义表示 + 词典先验</text>
  <rect x="88" y="366" width="144" height="82" rx="8" fill="#f8fafc" class="box"/>
  <text x="160" y="398" text-anchor="middle" class="small">每个字符位置</text>
  <text x="160" y="423" text-anchor="middle" class="tiny">h_1 ... h_n</text>

  <rect x="322" y="128" width="238" height="420" rx="14" class="panel"/>
  <text x="441" y="162" text-anchor="middle" class="label">边界表示</text>
  <rect x="362" y="214" width="158" height="88" rx="8" fill="#e0f2fe" class="box"/>
  <text x="441" y="247" text-anchor="middle" class="small">起始 FFN</text>
  <text x="441" y="273" text-anchor="middle" class="tiny">H_start</text>
  <rect x="362" y="374" width="158" height="88" rx="8" fill="#f3e8ff" class="box"/>
  <text x="441" y="407" text-anchor="middle" class="small">结束 FFN</text>
  <text x="441" y="433" text-anchor="middle" class="tiny">H_end</text>

  <rect x="615" y="128" width="230" height="420" rx="14" class="panel"/>
  <text x="730" y="162" text-anchor="middle" class="label">双仿射打分</text>
  <rect x="650" y="240" width="160" height="116" rx="8" fill="#fff7ed" class="box"/>
  <text x="730" y="276" text-anchor="middle" class="small">Biaffine</text>
  <text x="730" y="303" text-anchor="middle" class="small">span scorer</text>
  <text x="730" y="329" text-anchor="middle" class="tiny">score(i, j, c)</text>
  <rect x="650" y="398" width="160" height="74" rx="8" fill="#ffffff" class="box"/>
  <text x="730" y="428" text-anchor="middle" class="small">实体类别</text>
  <text x="730" y="452" text-anchor="middle" class="tiny">c = 1 ... C</text>

  <rect x="900" y="110" width="330" height="485" rx="14" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="1065" y="144" text-anchor="middle" class="label">Span 分类矩阵</text>
  <text x="1065" y="168" text-anchor="middle" class="small">行：start position；列：end position</text>

  <g transform="translate(962,215)">
    <text x="120" y="-34" text-anchor="middle" class="tiny">end position j</text>
    <text x="-45" y="125" transform="rotate(-90 -45 125)" text-anchor="middle" class="tiny">start position i</text>
    <rect x="0" y="0" width="240" height="240" fill="#ffffff" stroke="#475569" stroke-width="1.4"/>
    <path d="M0 0 L240 240" stroke="#ef4444" stroke-width="2"/>
    <polygon points="0,0 240,0 240,240" fill="#dbeafe" opacity="0.26"/>
    <polygon points="0,0 0,240 240,240" fill="#e5e7eb" opacity="0.45"/>
    <g>
      <line x1="40" y1="0" x2="40" y2="240" class="grid"/><line x1="80" y1="0" x2="80" y2="240" class="grid"/>
      <line x1="120" y1="0" x2="120" y2="240" class="grid"/><line x1="160" y1="0" x2="160" y2="240" class="grid"/><line x1="200" y1="0" x2="200" y2="240" class="grid"/>
      <line x1="0" y1="40" x2="240" y2="40" class="grid"/><line x1="0" y1="80" x2="240" y2="80" class="grid"/>
      <line x1="0" y1="120" x2="240" y2="120" class="grid"/><line x1="0" y1="160" x2="240" y2="160" class="grid"/><line x1="0" y1="200" x2="240" y2="200" class="grid"/>
    </g>
    <rect x="80" y="40" width="40" height="40" fill="#f59e0b" opacity="0.88"/>
    <rect x="120" y="80" width="40" height="40" fill="#10b981" opacity="0.88"/>
    <rect x="40" y="160" width="80" height="40" fill="#60a5fa" opacity="0.88"/>
    <text x="100" y="65" text-anchor="middle" class="tiny" fill="#111827">PER</text>
    <text x="140" y="105" text-anchor="middle" class="tiny" fill="#111827">FER</text>
    <text x="80" y="185" text-anchor="middle" class="tiny" fill="#111827">AGR</text>
  </g>

  <g transform="translate(935,515)">
    <rect x="0" y="0" width="18" height="18" fill="#dbeafe" stroke="#93c5fd"/><text x="28" y="14" class="tiny">有效候选 span (i ≤ j)</text>
    <rect x="168" y="0" width="18" height="18" fill="#e5e7eb" stroke="#cbd5e1"/><text x="196" y="14" class="tiny">无效区域</text>
    <rect x="0" y="30" width="18" height="18" fill="#10b981"/><text x="28" y="44" class="tiny">颜色块：预测实体片段</text>
  </g>

  <path d="M232 266 L362 258" class="line"/>
  <path d="M232 407 L362 418" class="line"/>
  <path d="M520 258 C560 268 590 284 650 297" class="line"/>
  <path d="M520 418 C565 405 595 356 650 322" class="line"/>
  <path d="M810 298 L900 342" class="line"/>
  <path d="M810 435 C850 425 872 385 900 362" class="line"/>

  <rect x="330" y="628" width="620" height="42" rx="10" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="640" y="655" text-anchor="middle" class="small">解码器直接对候选片段分类，联合判断起始位置、结束位置和实体类别。</text>
</svg>
