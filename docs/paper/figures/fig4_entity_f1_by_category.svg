  <rect x="1008" y="96" width="220" height="520" rx="12" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="1118" y="128" text-anchor="middle" class="label" font-weight="700">类别缩写</text>
  <g class="small">
    <text x="1030" y="164">PAR 部位</text><text x="1130" y="164">AGR 农事操作</text>
    <text x="1030" y="192">CUL 品种</text><text x="1130" y="192">PER 时期</text>
    <text x="1030" y="220">EQU 设备</text><text x="1130" y="220">LOC 地域</text>
    <text x="1030" y="248">DIS 病害</text><text x="1130" y="248">DRU 药剂</text>
    <text x="1030" y="276">PRO 产品/工艺</text><text x="1130" y="276">PES 虫害</text>
    <text x="1030" y="304">NUT 营养</text><text x="1130" y="304">FER 肥料</text>
    <text x="1030" y="332">WED 杂草</text><text x="1130" y="332">TAX 分类</text>
  </g>
  <line x1="1030" y1="360" x2="1206" y2="360" stroke="#cbd5e1"/>
  <rect x="1030" y="384" width="18" height="18" fill="#2563eb"/><text x="1058" y="398" class="small">F1 ≥ 88%</text>
  <rect x="1030" y="416" width="18" height="18" fill="#16a34a"/><text x="1058" y="430" class="small">80% ≤ F1 &lt; 88%</text>
  <rect x="1030" y="448" width="18" height="18" fill="#f59e0b"/><text x="1058" y="462" class="small">75% ≤ F1 &lt; 80%</text>
  <rect x="1030" y="480" width="18" height="18" fill="#dc2626"/><text x="1058" y="494" class="small">F1 &lt; 75%</text>
  <rect x="1030" y="528" width="176" height="42" rx="8" fill="#fef2f2" stroke="#fecaca"/>
  <text x="1118" y="546" text-anchor="middle" class="tiny">低频类别 FER 和 TAX</text>
  <text x="1118" y="564" text-anchor="middle" class="tiny">是主要短板</text>

  <text x="520" y="648" text-anchor="middle" class="small">低频肥料类和分类类 F1 明显低于高频部位、品种和病虫害类，说明样本稀缺与词典覆盖仍限制边界识别。</text>
</svg>
