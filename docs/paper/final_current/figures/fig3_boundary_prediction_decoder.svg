<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="600" viewBox="0 0 1100 600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#333"/>
    </marker>
    <style>
      .title { font-family: "Noto Sans CJK SC", "Source Han Sans SC", "Microsoft YaHei", Arial, sans-serif; font-size: 24px; font-weight: 700; fill: #222; }
      .label { font-family: "Noto Sans CJK SC", "Source Han Sans SC", "Microsoft YaHei", Arial, sans-serif; font-size: 17px; fill: #222; }
      .small { font-family: "Noto Sans CJK SC", "Source Han Sans SC", "Microsoft YaHei", Arial, sans-serif; font-size: 14px; fill: #333; }
      .box { stroke: #2f3b52; stroke-width: 1.6; rx: 8; ry: 8; }
      .line { stroke: #333; stroke-width: 1.8; fill: none; marker-end: url(#arrow); }
      .grid { stroke: #666; stroke-width: 1; fill: none; }
    </style>
  </defs>
  <rect width="1100" height="600" fill="#fff"/>
  <text x="550" y="42" text-anchor="middle" class="title">边界预测解码器结构</text>
  <text x="550" y="68" text-anchor="middle" class="small">Boundary Prediction Decoder with Biaffine Scoring</text>

  <rect x="60" y="250" width="170" height="90" fill="#eaf7ea" class="box"/>
  <text x="145" y="288" text-anchor="middle" class="label">融合特征</text>
  <text x="145" y="314" text-anchor="middle" class="small">H_fused</text>

  <rect x="315" y="150" width="170" height="84" fill="#e8f2ff" class="box"/>
  <text x="400" y="185" text-anchor="middle" class="label">起始 FFN</text>
  <text x="400" y="210" text-anchor="middle" class="small">H_start</text>

  <rect x="315" y="355" width="170" height="84" fill="#f1e9ff" class="box"/>
  <text x="400" y="390" text-anchor="middle" class="label">结束 FFN</text>
  <text x="400" y="415" text-anchor="middle" class="small">H_end</text>

  <rect x="570" y="255" width="170" height="90" fill="#fff1db" class="box"/>
  <text x="655" y="292" text-anchor="middle" class="label">双仿射打分</text>
  <text x="655" y="317" text-anchor="middle" class="small">score(i,j,c)</text>

  <rect x="820" y="130" width="230" height="350" fill="#f8f8f8" class="box"/>
  <text x="935" y="166" text-anchor="middle" class="label">Span 分类矩阵</text>
  <text x="935" y="190" text-anchor="middle" class="small">候选起止边界对 (i, j)</text>

  <g transform="translate(865,220)">
    <rect x="0" y="0" width="140" height="140" fill="#fff"/>
    <line x1="0" y1="28" x2="140" y2="28" class="grid"/>
    <line x1="0" y1="56" x2="140" y2="56" class="grid"/>
    <line x1="0" y1="84" x2="140" y2="84" class="grid"/>
    <line x1="0" y1="112" x2="140" y2="112" class="grid"/>
    <line x1="28" y1="0" x2="28" y2="140" class="grid"/>
    <line x1="56" y1="0" x2="56" y2="140" class="grid"/>
    <line x1="84" y1="0" x2="84" y2="140" class="grid"/>
    <line x1="112" y1="0" x2="112" y2="140" class="grid"/>
    <rect x="56" y="28" width="28" height="28" fill="#f7b267" opacity="0.9"/>
    <rect x="84" y="56" width="28" height="28" fill="#70c1b3" opacity="0.9"/>
    <rect x="28" y="84" width="28" height="28" fill="#b2dbbf" opacity="0.9"/>
    <path d="M0 0 L140 140" stroke="#d33" stroke-width="2"/>
  </g>

  <text x="935" y="405" text-anchor="middle" class="small">上三角区域表示有效候选 span</text>
  <text x="935" y="430" text-anchor="middle" class="small">颜色块表示被预测为实体的片段</text>

  <path d="M230 295 C270 260 285 205 315 192" class="line"/>
  <path d="M230 295 C270 330 285 390 315 397" class="line"/>
  <path d="M485 192 C530 205 545 260 570 286" class="line"/>
  <path d="M485 397 C530 382 545 330 570 315" class="line"/>
  <path d="M740 300 L820 300" class="line"/>

  <text x="550" y="540" text-anchor="middle" class="small">解码器直接对候选实体片段进行分类，联合建模起始位置、结束位置和实体类别。</text>
</svg>
