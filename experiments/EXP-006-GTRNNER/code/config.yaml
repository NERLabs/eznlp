# EXP-006-GTRNNER 实验配置
experiment:
  id: EXP-006-GTRNNER
  description: GTR-NNER技术迁移至扁平NER
  seed: 42

data:
  dataset: redjujube
  data_dir: /home/shiwenlong/NERlabs/eznlp/datasets/raw/RedJujube
  train_file: redjujube_train.bmes
  dev_file: redjujube_dev.bmes
  test_file: redjujube_test.bmes
  max_seq_length: 128
  label_scheme: BIOES

model:
  encoder:
    type: bert
    pretrained: /home/shiwenlong/NERlabs/eznlp/assets/transformers/hfl/chinese-macbert-base
    freeze: false
  
  bilstm:
    hid_dim: 256
    num_layers: 1
    dropout: 0.3
  
  # 相对位置编码 (RoPE)
  rope:
    enabled: true
    max_seq_len: 512
    base: 10000
  
  # 三仿射词典融合
  triaffine:
    enabled: true
    dict_dim: 64
    num_dict_types: 10
    hidden_dim: 256
  
  # 专家词典
  expert_dict:
    enabled: true
    dict_path: /home/shiwenlong/NERlabs/eznlp/datasets/raw/RedJujube/expert_lexicon_auto.txt
    dict_dim: 64
  
  decoder:
    type: crf

training:
  batch_size: 16
  epochs: 30
  learning_rate:
    bert: 2.0e-5
    other: 1.0e-3
  weight_decay: 0.01
  warmup_ratio: 0.1
  max_grad_norm: 1.0
  dropout: 0.3

evaluation:
  metric: entity_f1
  save_best: true
  early_stop: 5

output:
  save_dir: /home/shiwenlong/NERlabs/eznlp/experiments/EXP-006-GTRNNER/results
  log_dir: /home/shiwenlong/NERlabs/eznlp/experiments/EXP-006-GTRNNER/docs/logs

ablation:
  mode: full  # baseline, full, no_rope, no_triaffine