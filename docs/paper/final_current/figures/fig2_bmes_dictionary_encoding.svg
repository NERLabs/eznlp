<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="560" viewBox="0 0 1100 560">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#333"/>
    </marker>
    <style>
      .title { font-family: "Noto Sans CJK SC", "Source Han Sans SC", "Microsoft YaHei", Arial, sans-serif; font-size: 24px; font-weight: 700; fill: #222; }
      .label { font-family: "Noto Sans CJK SC", "Source Han Sans SC", "Microsoft YaHei", Arial, sans-serif; font-size: 17px; fill: #222; }
      .small { font-family: "Noto Sans CJK SC", "Source Han Sans SC", "Microsoft YaHei", Arial, sans-serif; font-size: 14px; fill: #333; }
      .box { stroke: #2f3b52; stroke-width: 1.6; rx: 8; ry: 8; }
      .line { stroke: #333; stroke-width: 1.8; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect width="1100" height="560" fill="#fff"/>
  <text x="550" y="42" text-anchor="middle" class="title">专家词典 BMES 四通道编码过程</text>
  <text x="550" y="68" text-anchor="middle" class="small">BMES Four-channel Encoding of Expert Dictionary Features</text>

  <rect x="50" y="205" width="150" height="82" fill="#f2f5f9" class="box"/>
  <text x="125" y="238" text-anchor="middle" class="label">输入字符</text>
  <text x="125" y="263" text-anchor="middle" class="small">x_i</text>

  <rect x="260" y="180" width="170" height="132" fill="#fff1db" class="box"/>
  <text x="345" y="222" text-anchor="middle" class="label">专家词典匹配</text>
  <text x="345" y="249" text-anchor="middle" class="small">由训练集实体</text>
  <text x="345" y="270" text-anchor="middle" class="small">自动抽取得到</text>

  <rect x="510" y="90" width="145" height="70" fill="#e8f2ff" class="box"/>
  <text x="582" y="120" text-anchor="middle" class="label">B 通道</text>
  <text x="582" y="144" text-anchor="middle" class="small">Begin</text>

  <rect x="510" y="190" width="145" height="70" fill="#eaf7ea" class="box"/>
  <text x="582" y="220" text-anchor="middle" class="label">M 通道</text>
  <text x="582" y="244" text-anchor="middle" class="small">Middle</text>

  <rect x="510" y="290" width="145" height="70" fill="#f1e9ff" class="box"/>
  <text x="582" y="320" text-anchor="middle" class="label">E 通道</text>
  <text x="582" y="344" text-anchor="middle" class="small">End</text>

  <rect x="510" y="390" width="145" height="70" fill="#ffecec" class="box"/>
  <text x="582" y="420" text-anchor="middle" class="label">S 通道</text>
  <text x="582" y="444" text-anchor="middle" class="small">Single</text>

  <rect x="745" y="175" width="170" height="150" fill="#f8f8f8" class="box"/>
  <text x="830" y="218" text-anchor="middle" class="label">四通道嵌入</text>
  <text x="830" y="246" text-anchor="middle" class="small">每通道 50 维</text>
  <text x="830" y="272" text-anchor="middle" class="small">拼接后 200 维</text>
  <text x="830" y="298" text-anchor="middle" class="small">e_B ⊕ e_M ⊕ e_E ⊕ e_S</text>

  <rect x="965" y="210" width="70" height="80" fill="#dff3ff" class="box"/>
  <text x="1000" y="244" text-anchor="middle" class="label">词典</text>
  <text x="1000" y="269" text-anchor="middle" class="label">特征</text>

  <path d="M200 246 L260 246" class="line"/>
  <path d="M430 246 C470 220 480 140 510 125" class="line"/>
  <path d="M430 246 L510 225" class="line"/>
  <path d="M430 246 L510 325" class="line"/>
  <path d="M430 246 C470 300 480 410 510 425" class="line"/>
  <path d="M655 125 C700 150 710 190 745 218" class="line"/>
  <path d="M655 225 L745 245" class="line"/>
  <path d="M655 325 L745 274" class="line"/>
  <path d="M655 425 C700 390 710 320 745 296" class="line"/>
  <path d="M915 250 L965 250" class="line"/>

  <text x="550" y="510" text-anchor="middle" class="small">四通道结构保留实体起始、内部、结束和单字位置先验，为边界预测提供领域约束。</text>
</svg>
