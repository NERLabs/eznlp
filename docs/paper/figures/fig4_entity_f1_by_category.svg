    <line x1="112" y1="212" x2="930" y2="212" class="grid"/><text x="92" y="217" text-anchor="end" class="small">80</text>
    <line x1="112" y1="128" x2="930" y2="128" class="grid"/><text x="92" y="133" text-anchor="end" class="small">100</text>
  </g>
  <text x="40" y="338" transform="rotate(-90 40 338)" text-anchor="middle" class="label">F1 / %</text>

  <g>
    <rect x="134" y="156.56" width="36" height="391.44" fill="#2563eb"/><text x="152" y="150" text-anchor="middle" class="small">93.20</text><text x="152" y="576" text-anchor="middle" class="small">PAR</text>
    <rect x="191" y="194.70" width="36" height="353.30" fill="#16a34a"/><text x="209" y="188" text-anchor="middle" class="small">84.12</text><text x="209" y="576" text-anchor="middle" class="small">AGR</text>
    <rect x="248" y="162.86" width="36" height="385.14" fill="#2563eb"/><text x="266" y="156" text-anchor="middle" class="small">91.70</text><text x="266" y="576" text-anchor="middle" class="small">CUL</text>
    <rect x="305" y="164.46" width="36" height="383.54" fill="#2563eb"/><text x="323" y="158" text-anchor="middle" class="small">91.32</text><text x="323" y="576" text-anchor="middle" class="small">PER</text>
    <rect x="362" y="218.68" width="36" height="329.32" fill="#f59e0b"/><text x="380" y="212" text-anchor="middle" class="small">78.41</text><text x="380" y="576" text-anchor="middle" class="small">EQU</text>
    <rect x="419" y="209.86" width="36" height="338.14" fill="#16a34a"/><text x="437" y="203" text-anchor="middle" class="small">80.51</text><text x="437" y="576" text-anchor="middle" class="small">LOC</text>
    <rect x="476" y="160.76" width="36" height="387.24" fill="#2563eb"/><text x="494" y="154" text-anchor="middle" class="small">92.20</text><text x="494" y="576" text-anchor="middle" class="small">DIS</text>
    <rect x="533" y="173.91" width="36" height="374.09" fill="#2563eb"/><text x="551" y="167" text-anchor="middle" class="small">89.07</text><text x="551" y="576" text-anchor="middle" class="small">DRU</text>
    <rect x="590" y="200.41" width="36" height="347.59" fill="#16a34a"/><text x="608" y="194" text-anchor="middle" class="small">82.76</text><text x="608" y="576" text-anchor="middle" class="small">PRO</text>
    <rect x="647" y="142.49" width="36" height="405.51" fill="#2563eb"/><text x="665" y="136" text-anchor="middle" class="small">96.55</text><text x="665" y="576" text-anchor="middle" class="small">PES</text>
    <rect x="704" y="171.76" width="36" height="376.24" fill="#2563eb"/><text x="722" y="165" text-anchor="middle" class="small">89.58</text><text x="722" y="576" text-anchor="middle" class="small">NUT</text>
    <rect x="761" y="262.40" width="36" height="285.60" fill="#dc2626" stroke="#7f1d1d" stroke-width="2"/><text x="779" y="252" text-anchor="middle" class="small" font-weight="700">68.00</text><text x="779" y="576" text-anchor="middle" class="small" font-weight="700">FER</text>
    <rect x="818" y="157.99" width="36" height="390.01" fill="#2563eb"/><text x="836" y="151" text-anchor="middle" class="small">92.86</text><text x="836" y="576" text-anchor="middle" class="small">WED</text>
    <rect x="875" y="251.52" width="36" height="296.48" fill="#dc2626" stroke="#7f1d1d" stroke-width="2"/><text x="893" y="241" text-anchor="middle" class="small" font-weight="700">70.59</text><text x="893" y="576" text-anchor="middle" class="small" font-weight="700">TAX</text>
